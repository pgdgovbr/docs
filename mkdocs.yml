site_name: PGD Livre
site_description: Guia do usuário do PGD Livre — gestão do Programa de Gestão e Desempenho no serviço público federal
site_url: https://pgdgovbr.github.io/docs/
repo_url: https://github.com/pgdgovbr/docs
repo_name: pgdgovbr/docs
docs_dir: docs
copyright: >
  © PGD Livre — conteúdo licenciado sob
  <a href="https://creativecommons.org/licenses/by/4.0/deed.pt-br" rel="license" target="_blank">CC BY 4.0</a>

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Início: index.md
  - O que é o PGD Livre:
    - Visão geral: sobre/pgd-libre.md
    - Requisitos funcionais cobertos: sobre/requisitos-funcionais.md
  - Conceitos do PGD:
    - O Programa de Gestão: conceitos/programa.md
    - Pactuação bilateral do Plano: conceitos/pactuacao-bilateral.md
    - Papéis e responsabilidades: conceitos/papeis.md
    - Glossário: conceitos/glossario.md
  - Experimente a Demo:
    - Como acessar: demo/acesso.md
    - Jornada do Servidor: demo/jornada-servidor.md
    - Jornada da Chefia: demo/jornada-chefia.md
    - Jornada do Gestor e Admin: demo/jornada-gestor.md
  - Sou Servidor:
    - Visão geral do papel: servidor/visao-geral.md
    - Criar meu Plano de Trabalho: servidor/criar-plano.md
    - Revisar plano ajustado pela chefia: servidor/revisar-plano.md
    - Meu Plano de Trabalho: servidor/meu-plano.md
    - Registrar Execução: servidor/registrar-execucao.md
    - Minhas Avaliações: servidor/avaliacoes.md
    - Contestar uma Avaliação: servidor/contestar-avaliacao.md
    - Referência rápida: servidor/referencia-rapida.md
  - Sou Chefia Imediata:
    - Visão geral do papel: chefia/visao-geral.md
    - Minha Equipe: chefia/minha-equipe.md
    - Revisar e assinar Plano de Trabalho: chefia/revisar-plano.md
    - Avaliar Registros: chefia/avaliar-registros.md
    - Responder um Recurso: chefia/responder-recurso.md
    - Criar Plano de Trabalho (exceção): chefia/criar-plano-excecao.md
    - Emitir Convocação: chefia/emitir-convocacao.md
    - Referência rápida: chefia/referencia-rapida.md
  - Sou Gestor de Unidade:
    - Visão geral do papel: gestor/visao-geral.md
    - Dashboard e KPIs: gestor/dashboard.md
    - Aprovar Planos de Entregas: gestor/aprovar-planos.md
    - Painel de Conformidade: gestor/conformidade.md
